apiVersion: 1

datasources:

  # ── Mimir (Prometheus-compatible metrics) ──────────────────────────────────
  - name: Mimir
    type: prometheus
    uid: mimir
    url: http://mimir:9009/prometheus
    access: proxy
    isDefault: false
    jsonData:
      httpMethod: POST
      # Exemplars allow jumping from a metric spike → trace in Tempo
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo

  # ── Loki (logs) ────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      # Derive a Tempo link from the traceId field embedded in JSON logs
      derivedFields:
        - name: TraceID
          # Matches: "traceId":"<32-char hex>"
          matcherRegex: '"traceId"\s*:\s*"([a-f0-9]{32})"'
          url: '$${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: 'Open in Tempo'

  # ── Tempo (distributed traces) ─────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    access: proxy
    jsonData:
      # ── Trace → Logs (Loki) ───────────────────────────────────────────────
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-1m'
        spanEndTimeShift:   '1m'
        filterByTraceID:    true
        filterBySpanID:     false
        customQuery:        true
        # LogQL query: find log lines whose JSON body contains this traceId
        query: '{service_name="observability-demo"} | json | traceId=`${__span.traceId}`'

      # ── Trace → Metrics (Mimir) ───────────────────────────────────────────
      tracesToMetrics:
        datasourceUid: mimir
        spanStartTimeShift: '-5m'
        spanEndTimeShift:   '5m'
        tags:
          - key: service.name
            value: service
        queries:
          - name: 'Request rate'
            query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags}[$$__rate_interval]))'
          - name: 'Error rate'
            query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags, status_code="STATUS_CODE_ERROR"}[$$__rate_interval]))'
          - name: 'P99 latency'
            query: 'histogram_quantile(0.99, sum(rate(traces_spanmetrics_duration_milliseconds_bucket{$$__tags}[$$__rate_interval])) by (le))'

      # ── Service map (from span-metrics generated by Tempo → Mimir) ────────
      serviceMap:
        datasourceUid: mimir

      # ── Node graph visualization ───────────────────────────────────────────
      nodeGraph:
        enabled: true

      # ── TraceQL search ─────────────────────────────────────────────────────
      search:
        hide: false

      # ── Allow clicking a traceId in Loki to jump here ─────────────────────
      lokiSearch:
        datasourceUid: loki

  # ── Grafana Pyroscope (continuous profiling) ───────────────────────────────
  - name: Pyroscope
    type: grafana-pyroscope-datasource
    uid: pyroscope
    url: http://pyroscope:4040
    access: proxy
    jsonData:
      # Link a profile query to the matching Tempo trace
      profilesTraceUrl: '/explore?left={"datasource":"tempo","queries":[{"query":"${__value.raw}","queryType":"traceql","refId":"A"}]}'
